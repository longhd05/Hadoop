version: "3"

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    ports:
      - 9870:9870
      - 9000:9000
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_hadoop_http_filter_initializers=org.apache.hadoop.security.HttpCrossOriginFilterInitializer
      - CORE_CONF_hadoop_http_cross___origin_enabled=true
      - CORE_CONF_hadoop_http_cross___origin_allowed___origins=http://${HADOOP_HOST:-localhost}:9870,http://localhost:9870,http://127.0.0.1:9870
      - CORE_CONF_hadoop_http_cross___origin_allowed___methods=GET,POST,PUT,DELETE,HEAD,OPTIONS
      - CORE_CONF_hadoop_http_cross___origin_allowed___headers=X-Requested-With,Content-Type,Accept,Origin
      - CORE_CONF_hadoop_http_cross___origin_max___age=1800
      - HDFS_CONF_dfs_client_use_datanode_hostname=true
    env_file:
      - ./hadoop.env

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: always
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    ports:
      - "9864:9864"
      - "9866:9866"
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
      CORE_CONF_hadoop_http_filter_initializers: "org.apache.hadoop.security.HttpCrossOriginFilterInitializer"
      CORE_CONF_hadoop_http_cross___origin_enabled: "true"
      CORE_CONF_hadoop_http_cross___origin_allowed___origins: "http://${HADOOP_HOST:-localhost}:9870,http://localhost:9870,http://127.0.0.1:9870"
      CORE_CONF_hadoop_http_cross___origin_allowed___methods: "GET,POST,PUT,DELETE,HEAD,OPTIONS"
      CORE_CONF_hadoop_http_cross___origin_allowed___headers: "X-Requested-With,Content-Type,Accept,Origin"
      CORE_CONF_hadoop_http_cross___origin_max___age: "1800"
      HDFS_CONF_dfs_client_use_datanode_hostname: "true"
      HDFS_CONF_dfs_datanode_use_datanode_hostname: "true"
      HDFS_CONF_dfs_datanode_hostname: "${HADOOP_HOST:-localhost}"
    env_file:
      - ./hadoop.env
  
  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864"
    env_file:
      - ./hadoop.env

  nodemanager1:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    env_file:
      - ./hadoop.env
  
  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: historyserver
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    env_file:
      - ./hadoop.env
  
volumes:
  hadoop_namenode:
  hadoop_datanode:
  hadoop_historyserver:
