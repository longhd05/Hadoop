[libdefaults]
  default_realm = HADOOP.LAB
  dns_lookup_realm = false
  dns_lookup_kdc = false
  ticket_lifetime = 24h
  renew_lifetime = 7d
  forwardable = true
  rdns = false

[realms]
  HADOOP.LAB = {
    kdc = kdc.hadoop.lab
    admin_server = kdc.hadoop.lab
  }

[domain_realm]
  .hadoop.lab = HADOOP.LAB
  hadoop.lab = HADOOP.LAB
